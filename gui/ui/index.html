<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>RDK X5 控制台</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>RDK X5 控制台</h1>
  <input id="url" type="text" value="ws://192.168.3.187:9090">
  <button id="btn">连接</button>
  <span id="st" class="pill bad">未连接</span>
  <span id="batt" class="pill" style="display:none"></span>
  <div id="tabs">
    <button class="tab on" data-page="dash">仪表盘</button>
    <button class="tab" data-page="logs">日志</button>
  </div>
</header>

<main>
<!-- ======================= dashboard ======================= -->
<div id="page-dash" class="page on">
  <div id="dashbar">
    <button id="mScan" class="mode">雷达</button>
    <button id="mMap"  class="mode on">地图</button>
    <button id="stop" style="background:#a33">■ 终止</button>
    <span id="stats"></span>
    <span id="hint">滚轮缩放 · 拖动＝设导航目标 · ■终止＝取消+刹停 · ⌨️ WASD/方向键=前后转向 Q/E=横移 空格=急停</span>
  </div>
  <div id="cvwrap">
    <div id="wrap">
      <canvas id="cv" width="1000" height="1000"></canvas>
      <div id="cambox" title="拖动移动 · 右下角拉伸改大小"><img id="cam" alt="camera"><div id="camgrip"></div></div>
    </div>
  </div>
</div>

<!-- ======================= logs ======================= -->
<div id="page-logs" class="page">
  <div id="logwrap">
    <div id="logside">
      <div class="sidehead">实时 (rosbridge)</div>
      <div class="src on" data-src="rosout"><span class="dot" id="dot-rosout"></span>/rosout 全部节点</div>
      <div class="sidehead">systemd (ssh)</div>
      <div class="src" data-src="ms200-lidar"><span class="dot" id="dot-ms200-lidar"></span>ms200-lidar 雷达</div>
      <div class="src" data-src="rosbridge"><span class="dot" id="dot-rosbridge"></span>rosbridge 桥</div>
      <div class="src" data-src="mipi-cam"><span class="dot" id="dot-mipi-cam"></span>mipi-cam 相机</div>
      <div class="src" data-src="nav-bringup"><span class="dot" id="dot-nav-bringup"></span>nav-bringup 底盘</div>
      <div class="src" data-src="nav2"><span class="dot" id="dot-nav2"></span>nav2 导航</div>
      <div class="src" data-src="cam-service"><span class="dot" id="dot-cam-service"></span>cam-service ISP</div>
      <div class="sidehead">内核</div>
      <div class="src" data-src="dmesg"><span class="dot" id="dot-dmesg"></span>dmesg</div>
      <div id="boardinfo"></div>
    </div>
    <div id="logmain">
      <div id="logbar">
        <button class="lvl"    data-lv="10">DEBUG</button>
        <button class="lvl on" data-lv="20">INFO</button>
        <button class="lvl on" data-lv="30">WARN</button>
        <button class="lvl on" data-lv="40">ERROR</button>
        <input id="logfilter" type="text" placeholder="关键字 / 节点名过滤">
        <select id="jlines"><option>100</option><option selected>300</option><option>1000</option></select>
        <button id="jrefresh">刷新</button>
        <label class="chk"><input type="checkbox" id="jauto"> 自动刷新5s</label>
        <label class="chk"><input type="checkbox" id="ascroll" checked> 自动滚屏</label>
        <button id="lclear" style="background:#31344b">清空</button>
        <span id="logmeta"></span>
      </div>
      <div id="logpath"></div>
      <div id="logview"></div>
    </div>
  </div>
</div>
</main>

<script type="module" src="js/main.js"></script>
</body>
</html>
